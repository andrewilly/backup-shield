name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  MANIFEST_PATH: Backup-shield/Cargo.toml

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: Backup-shield

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: Backup-shield
          cache-on-failure: true

      - name: cargo check
        run: cargo check --manifest-path ${{ env.MANIFEST_PATH }} --all-targets

      - name: cargo test
        run: cargo test --manifest-path ${{ env.MANIFEST_PATH }}

      - name: cargo clippy
        run: cargo clippy --manifest-path ${{ env.MANIFEST_PATH }} --all-targets -- -D warnings

      - name: cargo fmt --check
        run: cargo fmt --manifest-path ${{ env.MANIFEST_PATH }} --check

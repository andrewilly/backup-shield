name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: cargo check
        run: cargo check --all-targets

      - name: Build CLI binary
        run: cargo build -p backup-shield-cli

      - name: Set binary path (Unix)
        if: runner.os != 'Windows'
        run: echo "CARGO_BIN_EXE_backup-shield=$PWD/target/debug/backup-shield" >> $GITHUB_ENV

      - name: Set binary path (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "CARGO_BIN_EXE_backup-shield=$env:GITHUB_WORKSPACE\target\debug\backup-shield.exe" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: cargo test
        run: cargo test

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo fmt --check
        run: cargo fmt --check
